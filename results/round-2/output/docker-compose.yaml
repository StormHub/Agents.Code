version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: weather-chat-api
    ports:
      - "8000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      OLLAMA_URL: http://host.docker.internal:11434
    networks:
      - weather-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: weather-chat-app
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://api:5000
    networks:
      - weather-chat-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  weather-chat-network:
    driver: bridge
